<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TaskFlow // Advanced Task Manager</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="app-container">
        <header>
            <div class="logo-area">
                <h1>TaskFlow</h1>
                <p>Organize your daily grind</p>
            </div>
            <button id="theme-toggle" class="btn-icon" aria-label="Toggle Dark Mode">
                <svg class="sun-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"></circle><line x1="12" y1="1" x2="12" y2="3"></line><line x1="12" y1="21" x2="12" y2="23"></line><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line><line x1="1" y1="12" x2="3" y2="12"></line><line x1="21" y1="12" x2="23" y2="12"></line><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line></svg>
                <svg class="moon-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path></svg>
            </button>
        </header>

        <section class="stats-grid">
            <div class="stat-card total">
                <span class="stat-number" id="stat-total">0</span>
                <span class="stat-label">Total Tasks</span>
            </div>
            <div class="stat-card pending">
                <span class="stat-number" id="stat-pending">0</span>
                <span class="stat-label">Pending</span>
            </div>
            <div class="stat-card completed">
                <span class="stat-number" id="stat-completed">0</span>
                <span class="stat-label">Completed</span>
            </div>
        </section>

        <section class="creator-card">
            <form id="task-form">
                <input type="hidden" id="edit-task-id">
                <div class="form-main-row">
                    <input type="text" id="task-input" placeholder="What needs to be done?" required maxlength="100">
                    <button type="submit" id="submit-btn" class="btn-primary">Add Task</button>
                </div>
                
                <div class="form-meta-row">
                    <div class="meta-field">
                        <label for="task-category">Category</label>
                        <select id="task-category">
                            <option value="General">General</option>
                            <option value="Work">Work</option>
                            <option value="Personal">Personal</option>
                            <option value="Shopping">Shopping</option>
                        </select>
                    </div>

                    <div class="meta-field">
                        <label for="task-priority">Priority</label>
                        <select id="task-priority">
                            <option value="low">Low</option>
                            <option value="medium" selected>Medium</option>
                            <option value="high">High</option>
                        </select>
                    </div>

                    <div class="meta-field">
                        <label for="task-date">Due Date</label>
                        <input type="date" id="task-date">
                    </div>
                </div>
            </form>
        </section>

        <section class="controls-card">
            <div class="search-box">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="search-icon"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
                <input type="text" id="search-input" placeholder="Search tasks...">
            </div>
            
            <div class="filter-box">
                <button class="filter-btn active" data-filter="all">All</button>
                <button class="filter-btn" data-filter="pending">Pending</button>
                <button class="filter-btn" data-filter="completed">Completed</button>
            </div>
        </section>

        <main>
            <ul id="task-list" class="task-list">
                <!-- Dynamic injection from JS -->
            </ul>
            <div id="empty-state" class="empty-state">
                <p>No tasks found. Relax, or start adding some!</p>
            </div>
        </main>
    </div>

    <script src="script.js"></script>
</body>
</html>
